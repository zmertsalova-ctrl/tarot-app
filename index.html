<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расклад Таро</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #07101B 0%, #0D2944 100%);
            color: #B1B9C5;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1800px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #B1B9C5;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(11, 107, 129, 0.5);
            font-size: 2.5em;
            letter-spacing: 3px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .account-btn {
            padding: 12px 25px;
            background: #0B6B81;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        .account-btn:hover {
            background: #12506F;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 107, 129, 0.4);
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .controls select, .controls button {
            padding: 12px 25px;
            font-size: 14px;
            border: 2px solid #0B6B81;
            border-radius: 25px;
            background: #0D2944;
            color: #B1B9C5;
            cursor: pointer;
            transition: all 0.3s;
        }
        .controls button {
            background: #0B6B81;
            color: #B1B9C5;
            font-weight: bold;
        }
        .controls button:hover {
            background: #12506F;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 107, 129, 0.4);
        }
        .workspace { display: flex; gap: 25px; margin-bottom: 30px; position: relative; }
        .deck {
            width: 200px;
            background: rgba(13, 41, 68, 0.8);
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(11, 107, 129, 0.3);
        }
        .deck h2 { color: #B1B9C5; margin-bottom: 15px; font-size: 18px; }
        .deck-card {
            width: 120px;
            height: 180px;
            margin: 10px auto;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #B1B9C5;
            box-shadow: 0 0 20px rgba(11, 107, 129, 0.3);
        }
        .deck-card:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 30px rgba(177, 185, 197, 0.6);
        }
        .deck-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .cat-container {
            margin-top: 20px;
            position: relative;
            width: 100px;
            height: 100px;
            margin: 20px auto 0;
        }
        .cat {
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.3s;
            display: block;
        }
        .cat:hover {
            transform: scale(1.1);
        }
        .cat-paw {
            position: absolute;
            font-size: 30px;
            transition: all 0.3s;
            opacity: 0;
        }
        .cat-paw.show {
            opacity: 1;
            transform: translate(20px, -20px) rotate(-45deg);
        }
        
        .table-container { flex: 1; overflow: hidden; }
        .table {
            min-height: 700px;
            background-color: #07101B;
            border: 3px solid #0B6B81;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6);
        }
        .table h2 { 
            color: #B1B9C5; 
            margin-bottom: 20px; 
            text-align: center;
            font-size: 1.8em;
        }
        .spread-layout-wrapper { width: 100%; overflow: hidden; }
        .spread-layout {
            position: relative;
            width: 100%;
            min-height: 600px;
            transform-origin: top left;
        }
        .spread-position {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .position-label {
            color: #B1B9C5;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
        }
        .placed-card {
            width: 120px;
            height: 180px;
            border: 3px solid #0B6B81;
            border-radius: 10px;
            position: relative;
            overflow: visible;
            background: #B1B9C5;
            cursor: move;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        .placed-card:hover { 
            box-shadow: 0 0 25px rgba(11, 107, 129, 0.6);
            transform: translateY(-3px);
        }
        .placed-card.locked { cursor: default; }
        .placed-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
        .placed-card.flipped img { transform: rotate(180deg); }
        .card-controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            gap: 5px;
            background: rgba(7, 16, 27, 0.95);
            padding: 10px;
            border-radius: 10px;
            z-index: 100;
            border: 1px solid #0B6B81;
            min-width: 150px;
        }
        .placed-card:hover .card-controls,
        .clarifier-card:hover .card-controls { display: flex !important; }
        .card-controls-row { display: flex; gap: 5px; justify-content: center; }
        .card-controls button {
            background: #0B6B81;
            color: #B1B9C5;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .card-controls button:hover { 
            background: #12506F;
            transform: scale(1.05);
        }
        .card-controls button.clarify-btn { background: #0D2944; color: #B1B9C5; }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(7, 16, 27, 0.9);
            color: #B1B9C5;
            padding: 6px;
            font-size: 11px;
            text-align: center;
        }
        .clarifiers-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }
        .clarifier-card {
            width: 80px;
            height: 120px;
            border: 2px solid #0B6B81;
            border-radius: 8px;
            position: relative;
            background: #B1B9C5;
            cursor: move;
        }
        .clarifier-card img { width: 100%; height: 100%; object-fit: cover; }
        .clarifier-card.flipped img { transform: rotate(180deg); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(7, 16, 27, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0D2944;
            border: 3px solid #0B6B81;
            border-radius: 15px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { color: #B1B9C5; margin-bottom: 20px; text-align: center; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #B1B9C5; z-index: 10; position: relative; }
        .close-modal:hover { color: #F5F5F0; }
        select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #0B6B81;
            border-radius: 8px;
            background: #07101B;
            color: #B1B9C5;
            font-size: 14px;
        }
        textarea { resize: vertical; min-height: 90px; }
        .save-spread-btn {
            display: block;
            margin: 30px auto;
            padding: 18px 50px;
            font-size: 18px;
            background: #0B6B81;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .save-spread-btn:hover { 
            background: #12506F; 
            transform: translateY(-3px);
        }
        .free-spread-container { position: relative; width: 100%; min-height: 600px; }
        .question-form {
            background: rgba(177, 185, 197, 0.1);
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 35px;
            margin-top: 30px;
        }
        .question-form h2 { color: #B1B9C5; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; color: #B1B9C5; margin-bottom: 12px; font-size: 16px; }
        .input-with-voice { display: flex; gap: 12px; }
        .input-with-voice textarea { 
            flex: 1; 
            padding: 14px; 
            background: #F5F5F0;
            color: #07101B;
            min-height: 90px;
        }
        .voice-btn {
            padding: 14px 22px;
            background: #0D2944;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 10px;
            cursor: pointer;
        }
        .voice-btn:hover { background: #0B6B81; }
        .voice-btn.recording {
            background: #800B1F;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin: 25px 0;
            padding: 15px;
            background: rgba(11, 107, 129, 0.1);
            border-radius: 10px;
        }
        .checkbox-group input[type="checkbox"] { width: 22px; height: 22px; accent-color: #0B6B81; }
        .checkbox-group label { color: #B1B9C5; cursor: pointer; }
        .form-buttons { display: flex; gap: 20px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .save-btn, .predict-btn {
            padding: 16px 45px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .save-btn { background: #0D2944; color: #B1B9C5; border: 2px solid #0B6B81; }
        .save-btn:hover { background: #0B6B81; }
        .predict-btn { background: #0B6B81; color: #B1B9C5; border: 2px solid #0B6B81; }
        .predict-btn:hover { background: #12506F; transform: translateY(-3px); }
        .predict-btn:disabled { background: #1a3a4a; cursor: not-allowed; opacity: 0.6; }
        .prediction-result {
            background: #F5F5F0;
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 35px;
            margin-top: 30px;
            display: none;
        }
        .prediction-result h2 { color: #07101B; margin-bottom: 25px; text-align: center; }
        .prediction-section { margin-bottom: 30px; padding: 20px; background: rgba(245, 245, 240, 0.8); border-radius: 12px; border-left: 4px solid #0B6B81; }
        .prediction-section h3 { color: #07101B; margin-bottom: 15px; font-size: 1.4em; }
        .prediction-section p { color: #07101B; line-height: 1.9; font-size: 16px; white-space: pre-wrap; }
        .quote-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(11, 107, 129, 0.1), rgba(177, 185, 197, 0.2));
            border-radius: 12px;
            border: 2px dashed #0B6B81;
            text-align: center;
            font-style: italic;
            color: #07101B;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(7, 16, 27, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }
        .loading-overlay.active { display: flex; }
        .loading-text { color: #B1B9C5; font-size: 24px; animation: fadeInOut 2s infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .saved-reading {
            background: #F5F5F0;
            border: 2px solid #0B6B81;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            color: #07101B;
        }
        .saved-reading h4 { color: #07101B; margin-bottom: 10px; }
        .saved-reading .date { color: #0B6B81; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .saved-reading .cards-info {
            background: rgba(11, 107, 129, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 13px;
        }
        .saved-reading textarea {
            width: 100%;
            min-height: 80px;
            margin-top: 10px;
            background: #F5F5F0;
            color: #07101B;
            border: 1px solid #0B6B81;
        }
        .delete-btn {
            background: #800B1F;
            color: #F5F5F0;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .delete-btn:hover { background: #A01030; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>🔮 Расклад Таро 🔮</h1>
            <button class="account-btn" onclick="openAccount()">👤 Личный кабинет</button>
        </div>

        <div class="controls">
            <select id="spreadType" onchange="changeSpread()">
                <option value="three">Три в ряд</option>
                <option value="weekly">Недельный расклад</option>
                <option value="yearly">Расклад на год</option>
                <option value="celtic">Кельтский крест</option>
                <option value="station">Вокзал для двоих</option>
                <option value="free">Свободный расклад</option>
            </select>
            <button onclick="toggleLock()" id="lockBtn">🔓 Открепить</button>
            <button onclick="clearTable()">🗑 Очистить</button>
        </div>

        <div class="workspace">
            <div class="deck">
                <h2>Колода</h2>
                <div class="deck-card" onclick="drawCard()">
                    <img src="Рубашка карт.jpg" alt="Рубашка">
                </div>
                <p style="margin-top: 10px; font-size: 12px;">Нажми для карты</p>
                
                <div class="cat-container" id="catContainer">
                    <span class="cat" id="cat">🐱</span>
                    <span class="cat-paw" id="catPaw">🐾</span>
                </div>
            </div>

            <div class="table-container">
                <div class="table">
                    <h2 id="spreadName">Три в ряд</h2>
                    <div class="spread-layout-wrapper">
                        <div class="spread-layout" id="spreadLayout"></div>
                    </div>
                </div>
            </div>
        </div>

        <button class="save-spread-btn" onclick="showQuestionForm()">💾 Сохранить расклад</button>

        <div class="question-form" id="questionForm" style="display: none;">
            <h2>📝 Введи вопрос</h2>
            <div class="form-group">
                <label>Вопрос:</label>
                <div class="input-with-voice">
                    <textarea id="question" placeholder="Напиши вопрос..."></textarea>
                    <button class="voice-btn" onclick="startVoiceRecognition('question', this)">🎤</button>
                </div>
            </div>
            <div class="form-group">
                <label>Контекст:</label>
                <div class="input-with-voice">
                    <textarea id="context" placeholder="Дополнительно..."></textarea>
                    <button class="voice-btn" onclick="startVoiceRecognition('context', this)">🎤</button>
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="useHistory">
                <label>Учитывать предыдущие расклады</label>
            </div>
            <div class="form-buttons">
                <button class="save-btn" onclick="saveQuestion()">💾 Сохранить</button>
                <button class="predict-btn" id="predictBtn" onclick="getPrediction()">🔮 Получить</button>
            </div>
        </div>

        <div class="prediction-result" id="predictionResult">
            <h2>🔮 Предсказание</h2>
            <div class="prediction-section">
                <h3>✨ Краткий ответ:</h3>
                <p id="shortAnswer"></p>
            </div>
            <div class="prediction-section">
                <h3>📖 Подробно:</h3>
                <p id="detailedAnswer"></p>
            </div>
            <div class="prediction-section">
                <h3>🔮 Расклад:</h3>
                <p id="spreadDescription"></p>
            </div>
            <div class="quote-section" id="quoteSection"></div>
        </div>
    </div>

    <div id="cardModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>Выбери карту</h3>
            <select id="cardSelect"><option value="">-- Выбери --</option></select>
            <button onclick="confirmCardSelection()" style="margin-top: 15px; width: 100%; padding: 12px; background: #0B6B81; color: #B1B9C5; border: none; border-radius: 8px; cursor: pointer;">Подтвердить</button>
        </div>
    </div>

    <div id="accountModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAccount()">&times;</span>
            <h3>👤 Личный кабинет</h3>
            <div id="savedReadings"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="candle" style="width: 25px; height: 90px; background: linear-gradient(to bottom, #F5F5F0, #D0D0C8); border-radius: 3px; position: relative; border: 1px solid #B1B9C5;">
            <div style="position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 3px; height: 12px; background: #2C2C2C; border-radius: 2px;"></div>
            <div class="flame" style="width: 16px; height: 35px; background: linear-gradient(to bottom, #FFF8DC, #FFD700, #FF6347); border-radius: 50%; position: absolute; top: -45px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 25px #FFA500; animation: flicker 0.3s infinite;"></div>
        </div>
        <div class="loading-text">Ждём ответ от Высших сил...</div>
    </div>

        document.addEventListener('mousemove', (e) => {
            const catRect = catContainer.getBoundingClientRect();
            const catX = catRect.left + catRect.width / 2;
            const catY = catRect.top + catRect.height / 2;
            const distance = Math.sqrt(Math.pow(e.clientX - catX, 2) + Math.pow(e.clientY - catY, 2));
            
            if (distance < 150) {
                catPaw.classList.add('show');
                const angle = Math.atan2(e.clientY - catY, e.clientX - catX);
                const pawX = Math.cos(angle) * 30;
                const pawY = Math.sin(angle) * 30;
                catPaw.style.transform = `translate(${pawX}px, ${pawY}px) rotate(${angle}rad)`;
            } else {
                catPaw.classList.remove('show');
            }
        });

        window.onload = function() {
            const q = localStorage.getItem('tarot_question');
            const c = localStorage.getItem('tarot_context');
            const h = localStorage.getItem('tarot_useHistory');
            if (q) document.getElementById('question').value = q;
            if (c) document.getElementById('context').value = c;
            if (h) document.getElementById('useHistory').checked = h === 'true';
            renderSpread();
        };

        function getPositionHeight(idx) {
            const div = document.getElementById(`clarifiers-${idx}`);
            const count = div ? div.querySelectorAll('.clarifier-card').length : 0;
            return 180 + 90 + (count * 150);
        }

        function recalculatePositions() {
            if (currentSpread === 'free') return;
            const positions = spreads[currentSpread].positions;
            const rowHeights = {};
            positions.forEach((pos, i) => {
                if (!rowHeights[pos.row]) rowHeights[pos.row] = 0;
                const h = getPositionHeight(i);
                if (h > rowHeights[pos.row]) rowHeights[pos.row] = h;
            });
            let top = 10;
            const rowTops = {};
            Object.keys(rowHeights).sort().forEach(row => {
                rowTops[row] = top;
                top += rowHeights[row] + 40;
            });
            positions.forEach((pos, i) => {
                const div = document.getElementById(`position-${i}`);
                if (div) {
                    div.style.left = pos.leftPct + '%';
                    div.style.top = rowTops[pos.row] + 'px';
                }
            });
            document.getElementById('spreadLayout').style.minHeight = top + 'px';
        }

        function adjustLayoutScale() {
            const wrapper = document.querySelector('.spread-layout-wrapper');
            const layout = document.getElementById('spreadLayout');
            if (!wrapper || !layout) return;
            layout.style.transform = 'scale(1)';
            const w = wrapper.clientWidth;
            const l = layout.scrollWidth;
            if (l > w) {
                const s = w / l;
                layout.style.transform = `scale(${s})`;
                wrapper.style.height = (layout.offsetHeight * s) + 'px';
            } else {
                wrapper.style.height = layout.offsetHeight + 'px';
            }
        }

        window.addEventListener('resize', adjustLayoutScale);

        function changeSpread() {
            currentSpread = document.getElementById('spreadType').value;
            cardCounter = 0;
            nextPositionIndex = 0;
            freeCardCounter = 0;
            document.getElementById('spreadName').textContent = spreads[currentSpread].name;
            renderSpread();
        }

        function renderSpread() {
            const layout = document.getElementById('spreadLayout');
            layout.innerHTML = '';
            if (currentSpread === 'free') {
                const div = document.createElement('div');
                div.className = 'free-spread-container';
                div.id = 'freeContainer';
                layout.appendChild(div);
            } else {
                spreads[currentSpread].positions.forEach((pos, i) => {
                    const div = document.createElement('div');
                    div.className = 'spread-position';
                    div.id = `position-${i}`;
                    div.innerHTML = `
                        <div class="position-label">${pos.label}</div>
                        <div class="placed-card" id="card-${i}">
                            <img src="Рубашка карт.jpg" alt="Рубашка">
                            <div class="card-label">${pos.label}</div>
                            <div class="card-controls">
                                <div class="card-controls-row">
                                    <button onclick="event.stopPropagation();flipCardInPosition(${i})">Перевернуть</button>
                                    <button onclick="event.stopPropagation();openCardModalForPosition(${i})">Выбрать карту</button>
                                </div>
                                <div class="card-controls-row">
                                    <button class="clarify-btn" onclick="event.stopPropagation();addClarifier(${i})">+ Пояснение</button>
                                </div>
                            </div>
                        </div>
                        <div class="clarifiers-container" id="clarifiers-${i}"></div>
                    `;
                    layout.appendChild(div);
                });
                setTimeout(() => { recalculatePositions(); adjustLayoutScale(); }, 50);
            }
        }

        function drawCard() {
            if (currentSpread === 'free') {
                addFreeCard();
            } else if (nextPositionIndex < spreads[currentSpread].positions.length) {
                openCardModalForPosition(nextPositionIndex);
            } else {
                alert('Все позиции заполнены!');
            }
        }

        function addFreeCard() {
            const container = document.getElementById('freeContainer');
            if (!container) return;
            const div = document.createElement('div');
            div.className = 'placed-card';
            div.style.position = 'absolute';
            div.style.left = (Math.random() * 400 + 30) + 'px';
            div.style.top = (Math.random() * 250 + 20) + 'px';
            div.innerHTML = `
                <img src="Рубашка карт.jpg" alt="Рубашка">
                <div class="card-controls">
                    <button onclick="flipCard(this)">Перевернуть</button>
                    <button onclick="openCardModal(this)">Выбрать карту</button>
                </div>
            `;
            container.appendChild(div);
            freeCardCounter++;

            c.className = 'clarifier-card';

        function flipCardInPosition(idx) {

        function openCardModal(btn) {
            currentCardElement = btn.closest('.placed-card, .clarifier-card');

        function toggleLock() {

            document.getElementById('lockBtn').textContent = isLocked ? '🔒 Закреплено' : '🔓 Открепить';
            document.querySelectorAll('.placed-card, .clarifier-card').forEach(c => c.classList.toggle('locked', isLocked));

        function showQuestionForm() {
            const f = document.getElementById('questionForm');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';

        function saveQuestion() {
            localStorage.setItem('tarot_question', document.getElementById('question').value);

            alert('Сохранено!');
        }

        function startVoiceRecognition(fieldId, btn) {
            if (!('webkitSpeechRecognition' in window)) { alert('Не поддерживается'); return; }
            if (btn.classList.contains('recording')) { if (recognition) recognition.stop(); return; }
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;
            const field = document.getElementById(fieldId);
            let final = field.value;
            recognition.onstart = () => { btn.classList.add('recording'); btn.textContent = '⏹'; };
            recognition.onresult = (e) => {
                let interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                field.value = final + interim;
            };
            recognition.onend = () => { btn.classList.remove('recording'); btn.textContent = '🎤'; };
            recognition.start();
        }

        function collectSpreadText() {
            let text = `Расклад: ${spreads[currentSpread].name}\n\n`;
            if (currentSpread === 'free') {
                document.querySelectorAll('.free-card-container .placed-card, #freeContainer .placed-card').forEach((card, i) => {
                    const img = card.querySelector('img');
                    const name = img && img.src.includes('.jpg') ? img.src.split('/').pop().replace('.jpg','') : 'Не выбрана';
                    text += `Карта ${i+1}: ${name} ${card.classList.contains('flipped')?'(перевёрнута)':''}\n`;
                });
            } else {
                spreads[currentSpread].positions.forEach((pos, i) => {
                    const card = document.getElementById(`card-${i}`);
                    if (card) {
                        const img = card.querySelector('img');
                        const name = img && img.src.includes('.jpg') ? img.src.split('/').pop().replace('.jpg','') : 'Не выбрана';
                        text += `${pos.label}: ${name} ${card.classList.contains('flipped')?'(перевёрнута)':''}\n`;
                    }
                });
            }
            return text;
        }

        async function getPrediction() {
            const question = document.getElementById('question').value.trim();
            const context = document.getElementById('context').value.trim();
            if (!question) { alert('Введи вопрос!'); return; }
            const spreadText = collectSpreadText();
            if (!spreadText.includes('Карта') && !spreadText.includes(':')) { alert('Разложи карты!'); return; }

            const prompt = `Ты — мудрая гадалка. Вопрос: ${question}\nКонтекст: ${context || 'нет'}\n\n${spreadText}\n\nОтвечай в формате:\n### 1) Краткий ответ\n[2-3 предложения]\n\n### 2) Подробный ответ\n[развёрнуто]\n\n### 3) Описание расклада\n[анализ карт]`;

            document.getElementById('predictBtn').disabled = true;
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('predictionResult').style.display = 'block';
            document.getElementById('shortAnswer').textContent = '⏳ Ждём...';
            document.getElementById('detailedAnswer').textContent = '';
            document.getElementById('spreadDescription').textContent = '';

            try {
                const res = await fetch('https://text.pollinations.ai/openai', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({model:'openai', messages:[{role:'user', content:prompt}], temperature:0.7})
                });
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();
                const text = data.choices[0].message.content;
                
                const short = text.match(/1\)\s*Краткий ответ[:\s]*([\s\S]*?)(?=2\)|$)/i);
                const detailed = text.match(/2\)\s*Подробный ответ[:\s]*([\s\S]*?)(?=3\)|$)/i);
                const spread = text.match(/3\)\s*Описание расклада[:\s]*([\s\S]*?)$/i);
                
                document.getElementById('shortAnswer').textContent = short ? short[1].trim() : text.substring(0,300);
                document.getElementById('detailedAnswer').textContent = detailed ? detailed[1].trim() : '';
                document.getElementById('spreadDescription').textContent = spread ? spread[1].trim() : '';
                document.getElementById('quoteSection').textContent = quotes[Math.floor(Math.random()*quotes.length)];

                const history = JSON.parse(localStorage.getItem('tarot_history')||'[]');
                history.push({
                    date: new Date().toLocaleString('ru-RU'),
                    question, context,
                    shortAnswer: document.getElementById('shortAnswer').textContent,
                    detailedAnswer: document.getElementById('detailedAnswer').textContent,
                    spreadDescription: document.getElementById('spreadDescription').textContent,
                    cards: spreadText,
                    spreadType: currentSpread
                });
                localStorage.setItem('tarot_history', JSON.stringify(history));

            } catch(e) {
                document.getElementById('shortAnswer').textContent = '❌ Ошибка: '+e.message;
            } finally {
                document.getElementById('loadingOverlay').classList.remove('active');
                document.getElementById('predictBtn').disabled = false;
            }
        }

        function openAccount() {
            const modal = document.getElementById('accountModal');
            const div = document.getElementById('savedReadings');
            const history = JSON.parse(localStorage.getItem('tarot_history')||'[]');
            if (history.length === 0) {
                div.innerHTML = '<p style="text-align:center;color:#07101B">Нет сохранённых раскладов</p>';
            } else {
                div.innerHTML = history.map((r,i) => `
                    <div class="saved-reading">
                        <h4>Расклад #${i+1} — ${r.spreadType||'?'}</h4>
                        <div class="date">${r.date}</div>
                        <p><b>Вопрос:</b> ${r.question}</p>
                        ${r.context?`<p><b>Контекст:</b> ${r.context}</p>`:''}
                        <div class="cards-info"><b>Карты:</b><br>${r.cards.replace(/\n/g,'<br>').replace(/[#*`]/g,'')}</div>
                        <p><b>Ответ:</b><br>${r.shortAnswer}</p>
                        <label>Заметки:</label>
                        <textarea placeholder="Заметки..." onchange="saveNote(${i},this.value)">${r.note||''}</textarea>
                        <button class="delete-btn" onclick="deleteReading(${i})">🗑 Удалить</button>
                    </div>
                `).join('');
            }
            modal.style.display = 'flex';
        }

        function closeAccount() {
            document.getElementById('accountModal').style.display = 'none';
        }

        function deleteReading(idx) {
            if (!confirm('Удалить?')) return;
            const history = JSON.parse(localStorage.getItem('tarot_history')||'[]');
            history.splice(idx,1);
            localStorage.setItem('tarot_history', JSON.stringify(history));
            openAccount();
        }

        function saveNote(idx, note) {
            const history = JSON.parse(localStorage.getItem('tarot_history')||'[]');
            if (history[idx]) { history[idx].note = note; localStorage.setItem('tarot_history', JSON.stringify(history)); }
        }

        window.onclick = e => {
            if (e.target.id==='cardModal') closeModal();
            if (e.target.id==='accountModal') closeAccount();
        };

        renderSpread();
    </script>
