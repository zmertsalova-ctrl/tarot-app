<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расклад Таро</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #07101B 0%, #0D2944 100%);
            color: #B1B9C5;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1800px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #B1B9C5;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(11, 107, 129, 0.5);
            font-size: 2.5em;
            letter-spacing: 3px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .account-btn {
            padding: 12px 25px;
            background: #0B6B81;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        .account-btn:hover {
            background: #12506F;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 107, 129, 0.4);
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .controls select, .controls button {
            padding: 12px 25px;
            font-size: 14px;
            border: 2px solid #0B6B81;
            border-radius: 25px;
            background: #0D2944;
            color: #B1B9C5;
            cursor: pointer;
            transition: all 0.3s;
        }
        .controls button {
            background: #0B6B81;
            color: #B1B9C5;
            font-weight: bold;
        }
        .controls button:hover {
            background: #12506F;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 107, 129, 0.4);
        }
        .workspace { display: flex; gap: 25px; margin-bottom: 30px; }
        .deck {
            width: 200px;
            background: rgba(13, 41, 68, 0.8);
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(11, 107, 129, 0.3);
        }
        .deck h2 { color: #B1B9C5; margin-bottom: 15px; font-size: 18px; }
        .deck-card {
            width: 120px;
            height: 180px;
            margin: 10px auto;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #B1B9C5;
            box-shadow: 0 0 20px rgba(11, 107, 129, 0.3);
        }
        .deck-card:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 30px rgba(177, 185, 197, 0.6);
        }
        .deck-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Улучшенная свеча */
        .candle-container {
            margin-top: 25px;
            position: relative;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 25px;
        }
        .candle {
            width: 25px;
            height: 90px;
            background: linear-gradient(to bottom, #F5F5F0 0%, #E8E8E0 50%, #D0D0C8 100%);
            border-radius: 3px 3px 5px 5px;
            position: relative;
            border: 1px solid #B1B9C5;
            box-shadow: 0 0 15px rgba(255, 200, 150, 0.3);
        }
        .candle::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 12px;
            background: #2C2C2C;
            border-radius: 2px;
        }
        .flame {
            width: 16px;
            height: 35px;
            background: linear-gradient(to bottom, #FFF8DC 0%, #FFD700 30%, #FFA500 60%, #FF6347 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            opacity: 0;
            transition: all 0.8s ease-out;
            box-shadow: 0 0 25px #FFA500, 0 0 45px #FF6347, 0 0 65px #FFD700, 0 0 85px rgba(255, 100, 50, 0.5);
            animation: flicker 0.3s infinite alternate;
            filter: blur(0.5px);
            pointer-events: none;
        }
        .flame.lit {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            animation: growFlame 3s ease-out, flicker 0.3s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.95, 1.05) rotate(-1deg); opacity: 0.9; }
            25% { transform: translateX(-50%) scale(1.02, 0.98) rotate(0.5deg); opacity: 1; }
            50% { transform: translateX(-50%) scale(0.98, 1.02) rotate(-0.5deg); opacity: 0.95; }
            75% { transform: translateX(-50%) scale(1.01, 0.99) rotate(1deg); opacity: 1; }
            100% { transform: translateX(-50%) scale(1, 1) rotate(0deg); opacity: 0.98; }
        }
        @keyframes growFlame {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            30% { transform: translateX(-50%) scale(1.15); opacity: 0.8; }
            60% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        .lighter {
            width: 55px;
            height: 28px;
            background: linear-gradient(135deg, #0B6B81 0%, #07101B 100%);
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #B1B9C5;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #B1B9C5;
            font-size: 11px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .lighter:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(11, 107, 129, 0.6);
        }
        .lighter.lit {
            background: linear-gradient(135deg, #FF8C00 0%, #800B1F 100%);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
        }
        
        .table-container { flex: 1; overflow: hidden; }
        .table {
            min-height: 700px;
            background-color: #07101B;
            border: 3px solid #0B6B81;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(11, 107, 129, 0.2);
        }
        .table h2 { 
            color: #B1B9C5; 
            margin-bottom: 20px; 
            text-align: center;
            font-size: 1.8em;
            text-shadow: 0 0 15px rgba(11, 107, 129, 0.5);
        }
        .spread-layout-wrapper { width: 100%; overflow: hidden; }
        .spread-layout {
            position: relative;
            width: 100%;
            min-height: 600px;
            transform-origin: top left;
        }
        .spread-position {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .position-label {
            color: #B1B9C5;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
        }
        .placed-card {
            width: 120px;
            height: 180px;
            border: 3px solid #0B6B81;
            border-radius: 10px;
            position: relative;
            overflow: visible;
            background: #B1B9C5;
            cursor: move;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        .placed-card:hover { 
            box-shadow: 0 0 25px rgba(11, 107, 129, 0.6);
            transform: translateY(-3px);
        }
        .placed-card.locked { cursor: default; }
        .placed-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
        .placed-card.flipped img { transform: rotate(180deg); }
        .card-controls {
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            gap: 5px;
            background: rgba(7, 16, 27, 0.95);
            padding: 8px;
            border-radius: 10px;
            z-index: 20;
            border: 1px solid #0B6B81;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .placed-card:hover .card-controls,
        .clarifier-card:hover .card-controls { display: flex !important; }
        .card-controls-row { display: flex; gap: 5px; }
        .card-controls button {
            background: #0B6B81;
            color: #B1B9C5;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .card-controls button:hover { 
            background: #12506F;
            transform: scale(1.05);
        }
        .card-controls button.clarify-btn { background: #0D2944; color: #B1B9C5; }
        .card-controls button.clarify-btn:hover { background: #0B6B81; }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(7, 16, 27, 0.9);
            color: #B1B9C5;
            padding: 6px;
            font-size: 11px;
            text-align: center;
            border-bottom-left-radius: 7px;
            border-bottom-right-radius: 7px;
        }
        .clarifiers-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }
        .clarifier-card {
            width: 80px;
            height: 120px;
            border: 2px solid #0B6B81;
            border-radius: 8px;
            position: relative;
            overflow: visible;
            background: #B1B9C5;
            cursor: move;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
        }
        .clarifier-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .clarifier-card.flipped img { transform: rotate(180deg); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(7, 16, 27, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #0D2944;
            border: 3px solid #0B6B81;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 40px rgba(11, 107, 129, 0.4);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { color: #B1B9C5; margin-bottom: 20px; text-align: center; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #B1B9C5; }
        .close-modal:hover { color: #F5F5F0; }
        select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #0B6B81;
            border-radius: 8px;
            background: #07101B;
            color: #B1B9C5;
            font-size: 14px;
            font-family: 'Georgia', serif;
        }
        textarea { resize: vertical; min-height: 90px; }
        .save-spread-btn {
            display: block;
            margin: 30px auto;
            padding: 18px 50px;
            font-size: 18px;
            background: #0B6B81;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .save-spread-btn:hover { 
            background: #12506F; 
            border-color: #12506F;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(11, 107, 129, 0.4);
        }
        .free-spread-container {
            position: relative;
            width: 100%;
            min-height: 600px;
        }
        .question-form {
            background: rgba(177, 185, 197, 0.1);
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 35px;
            margin-top: 30px;
            box-shadow: 0 0 30px rgba(11, 107, 129, 0.2);
        }
        .question-form h2 { 
            color: #B1B9C5; 
            margin-bottom: 25px; 
            text-align: center;
            font-size: 1.8em;
        }
        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; 
            color: #B1B9C5; 
            margin-bottom: 12px; 
            font-size: 16px;
            font-weight: bold;
        }
        .input-with-voice { display: flex; gap: 12px; align-items: flex-start; }
        .input-with-voice textarea { 
            flex: 1; 
            padding: 14px; 
            min-height: 90px;
            background: #F5F5F0;
            color: #07101B;
            border: 2px solid #0B6B81;
        }
        .voice-btn {
            padding: 14px 22px;
            background: #0D2944;
            color: #B1B9C5;
            border: 2px solid #0B6B81;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .voice-btn:hover { 
            background: #0B6B81; 
            transform: translateY(-2px);
        }
        .voice-btn.recording {
            background: #800B1F;
            border-color: #800B1F;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin: 25px 0;
            padding: 15px;
            background: rgba(11, 107, 129, 0.1);
            border-radius: 10px;
        }
        .checkbox-group input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            accent-color: #0B6B81;
            cursor: pointer;
        }
        .checkbox-group label { 
            color: #B1B9C5; 
            cursor: pointer;
            font-size: 15px;
        }
        .form-buttons { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            margin-top: 25px; 
            flex-wrap: wrap; 
        }
        .save-btn, .predict-btn {
            padding: 16px 45px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .save-btn { 
            background: #0D2944; 
            color: #B1B9C5;
            border: 2px solid #0B6B81;
        }
        .save-btn:hover { 
            background: #0B6B81;
            transform: translateY(-2px);
        }
        .predict-btn { 
            background: #0B6B81; 
            color: #B1B9C5;
            border: 2px solid #0B6B81;
        }
        .predict-btn:hover { 
            background: #12506F;
            border-color: #12506F;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(11, 107, 129, 0.5);
        }
        .predict-btn:disabled { 
            background: #1a3a4a; 
            cursor: not-allowed; 
            transform: none;
            opacity: 0.6;
        }
        .prediction-result {
            background: #F5F5F0;
            border: 2px solid #0B6B81;
            border-radius: 15px;
            padding: 35px;
            margin-top: 30px;
            display: none;
            box-shadow: 0 0 40px rgba(11, 107, 129, 0.3);
        }
        .prediction-result h2 { 
            color: #07101B; 
            margin-bottom: 25px; 
            text-align: center;
            font-size: 2em;
            text-shadow: 0 0 15px rgba(11, 107, 129, 0.3);
        }
        .prediction-section { 
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(245, 245, 240, 0.8);
            border-radius: 12px;
            border-left: 4px solid #0B6B81;
        }
        .prediction-section h3 { 
            color: #07101B; 
            margin-bottom: 15px; 
            font-size: 1.4em;
        }
        .prediction-section p { 
            color: #07101B; 
            line-height: 1.9; 
            font-size: 16px; 
            white-space: pre-wrap;
            text-align: justify;
        }
        .quote-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(11, 107, 129, 0.1) 0%, rgba(177, 185, 197, 0.2) 100%);
            border-radius: 12px;
            border: 2px dashed #0B6B81;
            text-align: center;
            font-style: italic;
            color: #07101B;
            font-size: 16px;
            line-height: 1.6;
        }
        .quote-section::before {
            content: '"';
            font-size: 48px;
            color: #0B6B81;
            display: block;
            margin-bottom: -20px;
        }
        .free-card-container { position: absolute; }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(7, 16, 27, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: blur(10px);
        }
        .loading-overlay.active { display: flex; }
        .loading-text {
            color: #B1B9C5;
            font-size: 24px;
            text-align: center;
            animation: fadeInOut 2s infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .account-modal {
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .saved-reading {
            background: #F5F5F0;
            border: 2px solid #0B6B81;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            color: #07101B;
        }
        .saved-reading h4 {
            color: #07101B;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .saved-reading .date {
            color: #0B6B81;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .saved-reading .cards-info {
            background: rgba(11, 107, 129, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 13px;
        }
        .saved-reading textarea {
            width: 100%;
            min-height: 80px;
            margin-top: 10px;
            background: #F5F5F0;
            color: #07101B;
            border: 1px solid #0B6B81;
            border-radius: 5px;
            padding: 10px;
        }
        .delete-btn {
            background: #800B1F;
            color: #F5F5F0;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .delete-btn:hover {
            background: #A01030;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>🔮 Расклад Таро 🔮</h1>
            <button class="account-btn" onclick="openAccount()">👤 Личный кабинет</button>
        </div>

        <div class="controls">
            <select id="spreadType" onchange="changeSpread()">
                <option value="three">Три в ряд</option>
                <option value="weekly">Недельный расклад (5 карт)</option>
                <option value="yearly">Расклад на год (12 карт)</option>
                <option value="celtic">Кельтский крест</option>
                <option value="station">Вокзал для двоих</option>
                <option value="free">Свободный расклад</option>
            </select>
            <button onclick="toggleLock()" id="lockBtn">🔓 Открепить карты</button>
            <button onclick="clearTable()">🗑 Очистить стол</button>
        </div>

        <div class="workspace">
            <div class="deck">
                <h2>Колода</h2>
                <div class="deck-card" onclick="drawCard()">
                    <img src="таро/Рубашка карт.jpg" alt="Рубашка карты">
                </div>
                <p style="margin-top: 10px; font-size: 12px; color: #B1B9C5;">Нажми, чтобы вытянуть карту</p>
                
                <div class="candle-container">
                    <div class="candle" id="candle">
                        <div class="flame" id="flame"></div>
                    </div>
                    <div class="lighter" id="lighter" onclick="toggleCandle()">🔥 Зажечь</div>
                </div>
            </div>

            <div class="table-container">
                <div class="table">
                    <h2 id="spreadName">Три в ряд</h2>
                    <div class="spread-layout-wrapper" id="spreadWrapper">
                        <div class="spread-layout" id="spreadLayout"></div>
                    </div>
                </div>
            </div>
        </div>

        <button class="save-spread-btn" onclick="showQuestionForm()">💾 Сохранить расклад</button>

        <div class="question-form" id="questionForm" style="display: none;">
            <h2>📝 Введи свой вопрос</h2>

            <div class="form-group">
                <label for="question">Вопрос:</label>
                <div class="input-with-voice">
                    <textarea id="question" placeholder="Напиши свой вопрос или нажми кнопку микрофона..."></textarea>
                    <button class="voice-btn" onclick="startVoiceRecognition('question', this)">🎤 Голос</button>
                </div>
            </div>

            <div class="form-group">
                <label for="context">Контекст вопроса:</label>
                <div class="input-with-voice">
                    <textarea id="context" placeholder="Добавь контекст (необязательно)..."></textarea>
                    <button class="voice-btn" onclick="startVoiceRecognition('context', this)">🎤 Голос</button>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="useHistory">
                <label for="useHistory">Учитывать предыдущие расклады</label>
            </div>

            <div class="form-buttons">
                <button class="save-btn" onclick="saveQuestion()">💾 Сохранить текст</button>
                <button class="predict-btn" id="predictBtn" onclick="getPrediction()">🔮 Получить предсказание</button>
            </div>
        </div>

        <div class="prediction-result" id="predictionResult">
            <h2>🔮 Твоё предсказание 🔮</h2>
            <div class="prediction-section">
                <h3>✨ Краткий ответ:</h3>
                <p id="shortAnswer"></p>
            </div>
            <div class="prediction-section">
                <h3>📖 Подробный ответ:</h3>
                <p id="detailedAnswer"></p>
            </div>
            <div class="prediction-section">
                <h3>🔮 Описание расклада:</h3>
                <p id="spreadDescription"></p>
            </div>
            <div class="quote-section" id="quoteSection"></div>
