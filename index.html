<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расклад Таро</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: #07101B;
    color: #B1B9C5;
    min-height: 100vh;
    padding: 20px;
  }

  /* Шапка */
  .header {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 2.5rem;
    color: #B1B9C5;
    letter-spacing: 2px;
  }
  .cabinet-btn {
    position: absolute;
    right: 0;
    background: #0D2944;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: background 0.3s;
  }
  .cabinet-btn:hover { background: #12506F; }

  /* Панель управления */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .controls select, .controls button {
    background: #0D2944;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 10px 18px;
    border-radius: 6px;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: background 0.3s;
  }
  .controls select:hover, .controls button:hover { background: #12506F; }

  /* Рабочая область */
  .workspace {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }

  /* Левая колонка - колода */
  .deck-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    min-width: 200px;
  }
  .deck {
    width: 180px;
    height: 270px;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s;
  }
  .deck:hover { transform: scale(1.03); }
  .deck img {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(11, 107, 129, 0.4);
  }
  .deck-label {
    margin-top: 10px;
    color: #B1B9C5;
    font-style: italic;
  }

  /* Кот и лапка */
  .cat-container {
    margin-top: 20px;
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .cat {
    font-size: 60px;
    transition: transform 0.3s;
  }
  .paw {
    position: absolute;
    font-size: 30px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .paw.active { opacity: 1; }

  /* Правая колонка - стол */
  .table-column {
    flex: 1;
    min-width: 300px;
    max-width: 900px;
  }
  .table {
    background: #07101B;
    border: 2px solid #0B6B81;
    border-radius: 10px;
    padding: 20px;
    min-height: 400px;
    position: relative;
    overflow: visible;
  }
  .table-title {
    text-align: center;
    color: #B1B9C5;
    font-size: 1.3rem;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .table-area {
    position: relative;
    min-height: 350px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    align-items: flex-start;
  }

  /* Карта на столе */
  .card-slot {
    position: relative;
    width: 120px;
    text-align: center;
    padding-bottom: 90px; /* место для кнопок */
  }
  .card-slot .card-wrap {
    position: relative;
    width: 120px;
    height: 180px;
    cursor: pointer;
    transition: transform 0.6s;
  }
  .card-slot .card-wrap img {
    width: 100%;
    height: 100%;
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(11, 107, 129, 0.5);
  }
  .card-slot .card-wrap.flipped { transform: rotate(180deg); }
  .card-slot .card-name {
    margin-top: 6px;
    font-size: 0.8rem;
    color: #B1B9C5;
    min-height: 1.2em;
  }
  .card-slot .position-label {
    font-size: 0.75rem;
    color: #0B6B81;
    margin-top: 4px;
    font-style: italic;
  }

  /* Кнопки управления картой */
  .card-controls {
    position: absolute;
    bottom: -80px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .card-slot:hover .card-controls { opacity: 1; }
  .card-controls button {
    background: #0D2944;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: background 0.3s;
  }
  .card-controls button:hover { background: #12506F; }

  /* Поясняющие карты */
  .clarifiers {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .clarifier {
    width: 80px;
    height: 120px;
    cursor: pointer;
    transition: transform 0.6s;
  }
  .clarifier img {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(11, 107, 129, 0.4);
  }
  .clarifier.flipped { transform: rotate(180deg); }

  .save-spread-btn {
    display: block;
    margin: 20px auto 0;
    background: #0B6B81;
    color: #F5F5F0;
    border: none;
    padding: 12px 30px;
    border-radius: 6px;
    font-family: Georgia, serif;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s;
  }
  .save-spread-btn:hover { background: #12506F; }

  /* Форма вопроса */
  .question-form {
    display: none;
    background: #0D2944;
    border: 1px solid #0B6B81;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }
  .question-form.visible { display: block; }
  .question-form label {
    display: block;
    margin-bottom: 6px;
    color: #B1B9C5;
    font-size: 0.95rem;
  }
  .question-form input[type="text"],
  .question-form textarea {
    width: 100%;
    background: #07101B;
    border: 1px solid #0B6B81;
    color: #B1B9C5;
    padding: 10px;
    border-radius: 6px;
    font-family: Georgia, serif;
    margin-bottom: 12px;
  }
  .voice-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .voice-row input, .voice-row textarea { flex: 1; margin-bottom: 0; }
  .voice-btn {
    background: #0D2944;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: background 0.3s;
    min-width: 80px;
  }
  .voice-btn:hover { background: #12506F; }
  .voice-btn.recording {
    background: #800B1F;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(128, 11, 31, 0.6); }
    50% { box-shadow: 0 0 0 10px rgba(128, 11, 31, 0); }
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .form-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .form-buttons button {
    background: #0B6B81;
    color: #F5F5F0;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: background 0.3s;
  }
  .form-buttons button:hover { background: #12506F; }

  /* Блок предсказания */
  .prediction {
    display: none;
    background: #F5F5F0;
    color: #07101B;
    border-radius: 10px;
    padding: 30px;
    margin: 20px auto;
    max-width: 800px;
  }
  .prediction.visible { display: block; }
  .prediction h3 {
    color: #07101B;
    margin-bottom: 12px;
    border-bottom: 1px solid #0B6B81;
    padding-bottom: 6px;
  }
  .prediction p {
    color: #07101B;
    line-height: 1.6;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  .quote {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed #0B6B81;
    font-style: italic;
    color: #07101B;
    text-align: center;
  }

  /* Модальное окно */
  .modal-bg {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(7, 16, 27, 0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-bg.visible { display: flex; }
  .modal {
    background: #0D2944;
    border: 1px solid #0B6B81;
    border-radius: 10px;
    padding: 30px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 10px; right: 15px;
    background: none;
    border: none;
    color: #B1B9C5;
    font-size: 1.8rem;
    cursor: pointer;
  }
  .modal h2 {
    color: #B1B9C5;
    margin-bottom: 16px;
  }
  .modal select {
    width: 100%;
    background: #07101B;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 10px;
    border-radius: 6px;
    font-family: Georgia, serif;
    margin-bottom: 16px;
  }
  .modal button.primary {
    background: #0B6B81;
    color: #F5F5F0;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: Georgia, serif;
  }
  .modal button.primary:hover { background: #12506F; }

  /* Личный кабинет */
  .cabinet-modal .history-item {
    background: #07101B;
    border: 1px solid #0B6B81;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .cabinet-modal .history-item h4 {
    color: #0B6B81;
    margin-bottom: 8px;
  }
  .cabinet-modal .history-item .meta {
    font-size: 0.85rem;
    color: #B1B9C5;
    margin-bottom: 8px;
  }
  .cabinet-modal .history-item p {
    color: #B1B9C5;
    margin-bottom: 8px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .cabinet-modal .history-item textarea {
    width: 100%;
    background: #0D2944;
    color: #B1B9C5;
    border: 1px solid #0B6B81;
    padding: 8px;
    border-radius: 4px;
    font-family: Georgia, serif;
    resize: vertical;
    margin-bottom: 8px;
  }
  .cabinet-modal .delete-btn {
    background: #800B1F;
    color: #F5F5F0;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: Georgia, serif;
  }
  .cabinet-modal .delete-btn:hover { background: #a01028; }
  .no-readings {
    text-align: center;
    padding: 30px;
    color: #B1B9C5;
    font-style: italic;
  }

  /* Экран загрузки */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(7, 16, 27, 0.9);
    backdrop-filter: blur(6px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .loading-overlay.visible { display: flex; }

  .candle {
    position: relative;
    width: 40px;
    height: 120px;
    background: linear-gradient(to bottom, #d4b896, #8b6f47);
    border-radius: 4px 4px 2px 2px;
    margin-bottom: 40px;
  }
  .candle::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 10px;
    background: #222;
  }
  .flame {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 40px;
    background: radial-gradient(ellipse at center bottom, #ffffff 0%, #ffee58 30%, #ff9800 60%, #d84315 100%);
    border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
    animation: flicker 0.8s infinite alternate;
    box-shadow: 0 0 30px #ff9800, 0 0 60px #ff5722, 0 0 90px rgba(255, 152, 0, 0.5);
  }
  @keyframes flicker {
    0% { transform: translateX(-50%) scale(1) rotate(-2deg); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.05, 0.95) rotate(1deg); opacity: 0.9; }
    100% { transform: translateX(-50%) scale(0.95, 1.05) rotate(2deg); opacity: 1; }
  }
  .loading-text {
    color: #B1B9C5;
    font-size: 1.3rem;
    font-style: italic;
    animation: textPulse 1.5s infinite;
    text-align: center;
    padding: 0 20px;
  }
  @keyframes textPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @media (max-width: 700px) {
    .header h1 { font-size: 1.6rem; }
    .cabinet-btn { position: static; margin-top: 10px; }
    .header { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Расклад Таро</h1>
  <button class="cabinet-btn" onclick="openCabinet()">Личный кабинет</button>
</div>

<div class="controls">
  <select id="spreadType" onchange="changeSpreadType()">
    <option value="three">Три в ряд</option>
    <option value="week">Недельный</option>
    <option value="year">На год</option>
    <option value="celtic">Кельтский крест</option>
    <option value="duo">Вокзал для двоих</option>
    <option value="free">Свободный расклад</option>
  </select>
  <button id="pinBtn" onclick="togglePin()">Открепить</button>
  <button onclick="clearTable()">Очистить</button>
</div>

<div class="workspace">
  <div class="deck-column">
    <div class="deck" onclick="drawCard()">
      <img src="Рубашка карт.jpg" alt="Колода">
    </div>
    <div class="deck-label">Нажми для карты</div>
    <div class="cat-container" id="catContainer">
      <div class="cat">🐱</div>
      <div class="paw" id="paw">🐾</div>
    </div>
  </div>

  <div class="table-column">
    <div class="table" id="table">
      <div class="table-title" id="tableTitle">Три в ряд</div>
      <div class="table-area" id="tableArea"></div>
    </div>
    <button class="save-spread-btn" onclick="toggleQuestionForm()">Сохранить расклад</button>
  </div>
</div>

<div class="question-form" id="questionForm">
  <label>Вопрос</label>
  <div class="voice-row">
    <input type="text" id="questionInput" placeholder="Ваш вопрос Высшим силам...">
    <button class="voice-btn" onclick="startVoice('questionInput', this)">🎤 Запись</button>
  </div>
  <label>Контекст</label>
  <div class="voice-row">
    <textarea id="contextInput" rows="2" placeholder="Дополнительные обстоятельства..."></textarea>
    <button class="voice-btn" onclick="startVoice('contextInput', this)">🎤 Запись</button>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="useHistory">
    <label for="useHistory" style="margin:0;">Учитывать предыдущие расклады</label>
  </div>
  <div class="form-buttons">
    <button onclick="saveSpreadToHistory()">Сохранить</button>
    <button onclick="getAIPrediction()">Получить предсказание</button>
  </div>
</div>

<div class="prediction" id="prediction">
  <h3>Краткий ответ</h3>
  <p id="shortAnswer"></p>
  <h3>Подробно</h3>
  <p id="detailedAnswer"></p>
  <h3>Расклад</h3>
  <p id="spreadDescription"></p>
  <div class="quote" id="quote"></div>
</div>

<!-- Модальное окно выбора карты -->
<div class="modal-bg" id="cardModal">
  <div class="modal">
    <button class="modal-close" onclick="closeCardModal()">×</button>
    <h2>Выбрать карту</h2>
    <select id="cardSelect"></select>
    <button class="primary" onclick="confirmCardSelection()">Выбрать</button>
  </div>
</div>

<!-- Личный кабинет -->
<div class="modal-bg" id="cabinetModal">
  <div class="modal cabinet-modal">
    <button class="modal-close" onclick="closeCabinet()">×</button>
    <h2>Личный кабинет</h2>
    <div id="historyList"></div>
  </div>
</div>

<!-- Экран загрузки -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="candle">
    <div class="flame"></div>
  </div>
  <div class="loading-text">Ждём ответ от Высших сил...</div>
</div>

<script>
/* ============ ДАННЫЕ ============ */
const CARDS = [];
const majorArcana = [
  "0 Дурак","I Маг","II Верховная Жрица","III Императрица","IV Император",
  "V Иерофант","VI Влюблённые","VII Колесница","VIII Сила","IX Отшельник",
  "X Колесо Фортуны","XI Справедливость","XII Повешенный","XIII Смерть",
  "XIV Умеренность","XV Дьявол","XVI Башня","XVII Звезда","XVIII Луна",
  "XIX Солнце","XX Суд","XXI Мир"
];
const suits = ["жезлов","мечей","чаш","пентаклей"];
const minors = ["Туз","2","3","4","5","6","7","8","9","10","Паж","Рыцарь","Королева","Король"];

majorArcana.forEach(n => CARDS.push(n));
suits.forEach(s => minors.forEach(m => CARDS.push(m + " " + s)));

// Соответствие имён файлов
function cardFileName(name) {
  // Старшие арканы
  const majorMap = {
    "0 Дурак":"0 Дурак, Шут.jpg",
    "I Маг":"01 Маг.jpg",
    "II Верховная Жрица":"02 Верховная Жрица.jpg",
    "III Императрица":"03 Императрица.jpg",
    "IV Император":"04 Император.jpg",
    "V Иерофант":"05 Иерофант.jpg",
    "VI Влюблённые":"06 Влюблённые.jpg",
    "VII Колесница":"07 Колесница.jpg",
    "VIII Сила":"08 Сила.jpg",
    "IX Отшельник":"09 Отшельник.jpg",
    "X Колесо Фортуны":"10 Колесо Фортуны.jpg",
    "XI Справедливость":"11 Справедливость.jpg",
    "XII Повешенный":"12 Повешенный.jpg",
    "XIII Смерть":"13 Смерть.jpg",
    "XIV Умеренность":"14 Умеренность.jpg",
    "XV Дьявол":"15 Дьявол.jpg",
    "XVI Башня":"16 Башня.jpg",
    "XVII Звезда":"17 Звезда.jpg",
    "XVIII Луна":"18 Луна.jpg",
    "XIX Солнце":"19 Солнце.jpg",
    "XX Суд":"20 Суд.jpg",
    "XXI Мир":"21 Мир.jpg"
  };
  if (majorMap[name]) return encodeURI(majorMap[name]);
  // Младшие арканы: "Туз жезлов" -> "Туз жезлов.jpg"
  return encodeURI(name + ".jpg");
}

const SPREADS = {
  three: { name: "Три в ряд", positions: ["Прошлое","Настоящее","Будущее"] },
  week: { name: "Недельный", positions: ["Пн","Вт","Ср","Чт","Пт"] },
  year: { name: "На год", positions: ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"] },
  celtic: { name: "Кельтский крест", positions: ["Суть","Препятствие","Основа","Прошлое","Возможное","Ближайшее","Субъект","Окружение","Надежды","Итог"] },
  duo: { name: "Вокзал для двоих", positions: ["Ты","Партнёр","Твои чувства","Его чувства","Что между вами","Препятствие","Ближайшее","Итог"] },
  free: { name: "Свободный расклад", positions: [] }
};

const QUOTES = [
  "Карты показывают путь, но идёшь ты.",
  "Судьба любит смелых.",
  "В каждой карте — мудрость веков."
];

/* ============ СОСТОЯНИЕ ============ */
let currentSpread = "three";
let tableCards = []; // {card, flipped, clarifiers:[]}
let pinned = false;
let currentEditIndex = -1; // для модалки выбора карты
let currentClarifierFor = -1;

/* ============ ИНИЦИАЛИЗАЦИЯ ============ */
function init() {
  loadFromStorage();
  renderSpread();
  setupCat();
}

function loadFromStorage() {
  const q = localStorage.getItem("tarot_question");
  const c = localStorage.getItem("tarot_context");
  const h = localStorage.getItem("tarot_useHistory");
  if (q) document.getElementById("questionInput").value = q;
  if (c) document.getElementById("contextInput").value = c;
  if (h === "true") document.getElementById("useHistory").checked = true;
}

function saveQuestionState() {
  localStorage.setItem("tarot_question", document.getElementById("questionInput").value);
  localStorage.setItem("tarot_context", document.getElementById("contextInput").value);
  localStorage.setItem("tarot_useHistory", document.getElementById("useHistory").checked);
}

/* ============ РАСКЛАДЫ ============ */
function changeSpreadType() {
  currentSpread = document.getElementById("spreadType").value;
  if (!pinned) {
    tableCards = [];
  }
  renderSpread();
}

function renderSpread() {
  const spread = SPREADS[currentSpread];
  document.getElementById("tableTitle").textContent = spread.name;
  const area = document.getElementById("tableArea");
  area.innerHTML = "";

  if (currentSpread === "free") {
    // Свободный: показываем только добавленные карты
    tableCards.forEach((c, idx) => area.appendChild(createCardElement(c, idx, "Позиция " + (idx+1))));
  } else {
    const positions = spread.positions;
    // Убедимся что tableCards нужной длины
    while (tableCards.length < positions.length) tableCards.push(null);
    if (tableCards.length > positions.length) tableCards = tableCards.slice(0, positions.length);
    positions.forEach((pos, idx) => {
      area.appendChild(createCardElement(tableCards[idx], idx, pos));
    });
  }
  scaleTableIfNeeded();
}

function createCardElement(cardData, index, positionLabel) {
  const slot = document.createElement("div");
  slot.className = "card-slot";

  const wrap = document.createElement("div");
  wrap.className = "card-wrap" + (cardData && cardData.flipped ? " flipped" : "");
  const img = document.createElement("img");
  img.src = cardData ? cardFileName(cardData.card) : "Рубашка карт.jpg";
  img.alt = cardData ? cardData.card : "Карта";
  wrap.appendChild(img);
  wrap.onclick = () => openCardModal(index);
  slot.appendChild(wrap);

  const name = document.createElement("div");
  name.className = "card-name";
  name.textContent = cardData ? cardData.card : "";
  slot.appendChild(name);

  const posLbl = document.createElement("div");
  posLbl.className = "position-label";
  posLbl.textContent = positionLabel;
  slot.appendChild(posLbl);

  // Поясняющие карты
  if (cardData && cardData.clarifiers && cardData.clarifiers.length) {
    const cl = document.createElement("div");
    cl.className = "clarifiers";
    cardData.clarifiers.forEach((clar, ci) => {
      const ce = document.createElement("div");
      ce.className = "clarifier" + (clar.flipped ? " flipped" : "");
      ce.innerHTML = `<img src="${cardFileName(clar.card)}" alt="${clar.card}">`;
      ce.onclick = (e) => { e.stopPropagation(); clar.flipped = !clar.flipped; renderSpread(); };
      cl.appendChild(ce);
    });
    slot.appendChild(cl);
  }

  // Кнопки управления
  const controls = document.createElement("div");
  controls.className = "card-controls";
  const btnChoose = document.createElement("button");
  btnChoose.textContent = "Выбрать карту";
  btnChoose.onclick = (e) => { e.stopPropagation(); openCardModal(index); };
  controls.appendChild(btnChoose);

  if (cardData) {
    const btnFlip = document.createElement("button");
    btnFlip.textContent = "Перевернуть";
    btnFlip.onclick = (e) => { e.stopPropagation(); cardData.flipped = !cardData.flipped; renderSpread(); };
    controls.appendChild(btnFlip);

    const btnClar = document.createElement("button");
    btnClar.textContent = "+ Пояснение";
    btnClar.onclick = (e) => { e.stopPropagation(); openClarifierModal(index); };
    controls.appendChild(btnClar);
  }

  slot.appendChild(controls);
  return slot;
}

function scaleTableIfNeeded() {
  const table = document.getElementById("table");
  const area = document.getElementById("tableArea");
  table.style.transform = "";
  if (area.scrollWidth > table.clientWidth - 40) {
    const scale = (table.clientWidth - 40) / area.scrollWidth;
    area.style.transform = `scale(${scale})`;
    area.style.transformOrigin = "top left";
  } else {
    area.style.transform = "";
  }
}

/* ============ КАРТЫ ============ */
function drawCard() {
  if (currentSpread === "free") {
    tableCards.push({ card: randomCard(), flipped: false, clarifiers: [] });
  } else {
    const spread = SPREADS[currentSpread];
    while (tableCards.length < spread.positions.length) tableCards.push(null);
    const emptyIdx = tableCards.findIndex(c => c === null);
    if (emptyIdx === -1) {
      alert("Все позиции заполнены. Нажмите Очистить или выберите другой расклад.");
      return;
    }
    tableCards[emptyIdx] = { card: randomCard(), flipped: false, clarifiers: [] };
  }
  renderSpread();
}

function randomCard() {
  return CARDS[Math.floor(Math.random() * CARDS.length)];
}

function clearTable() {
  if (!confirm("Очистить стол?")) return;
  tableCards = [];
  document.getElementById("prediction").classList.remove("visible");
  renderSpread();
}

function togglePin() {
  pinned = !pinned;
  document.getElementById("pinBtn").textContent = pinned ? "Закрепить" : "Открепить";
}

/* ============ МОДАЛКА ВЫБОРА КАРТЫ ============ */
function openCardModal(index) {
  currentEditIndex = index;
  const sel = document.getElementById("cardSelect");
  sel.innerHTML = "";
  CARDS.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  if (tableCards[index] && tableCards[index].card) {
    sel.value = tableCards[index].card;
  }
  document.getElementById("cardModal").classList.add("visible");
}

function closeCardModal() {
  document.getElementById("cardModal").classList.remove("visible");
  currentEditIndex = -1;
}

function confirmCardSelection() {
  const sel = document.getElementById("cardSelect");
  const card = sel.value;
  if (currentEditIndex >= 0) {
    if (!tableCards[currentEditIndex]) {
      tableCards[currentEditIndex] = { card: card, flipped: false, clarifiers: [] };
    } else {
      tableCards[currentEditIndex].card = card;
    }
  }
  closeCardModal();
  renderSpread();
}

/* ============ ПОЯСНЕНИЯ ============ */
function openClarifierModal(mainIndex) {
  currentClarifierFor = mainIndex;
  const sel = document.getElementById("cardSelect");
  sel.innerHTML = "";
  CARDS.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  document.getElementById("cardModal").querySelector("h2").textContent = "Карта-пояснение";
  document.getElementById("cardModal").classList.add("visible");
  // Переопределим confirm на время
  const origConfirm = window.confirmCardSelection;
  window.confirmCardSelection = function() {
    const card = document.getElementById("cardSelect").value;
    if (!tableCards[currentClarifierFor].clarifiers) tableCards[currentClarifierFor].clarifiers = [];
    tableCards[currentClarifierFor].clarifiers.push({ card: card, flipped: false });
    document.getElementById("cardModal").classList.remove("visible");
    document.getElementById("cardModal").querySelector("h2").textContent = "Выбрать карту";
    window.confirmCardSelection = origConfirm;
    renderSpread();
  };
}

/* ============ ФОРМА ВОПРОСА ============ */
function toggleQuestionForm() {
  document.getElementById("questionForm").classList.toggle("visible");
}

/* ============ ГОЛОС ============ */
function startVoice(fieldId, btn) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Голосовой ввод не поддерживается в этом браузере."); return; }
  const rec = new SR();
  rec.lang = "ru-RU";
  rec.continuous = false;
  rec.interimResults = true;
  const field = document.getElementById(fieldId);
  btn.textContent = "Стоп";
  btn.classList.add("recording");
  rec.start();
  rec.onresult = (e) => {
    let transcript = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    field.value = transcript;
    saveQuestionState();
  };
  rec.onend = () => {
    btn.textContent = "🎤 Запись";
    btn.classList.remove("recording");
  };
  rec.onerror = () => {
    btn.textContent = "🎤 Запись";
    btn.classList.remove("recording");
  };
  btn.onclick = () => {
    try { rec.stop(); } catch(e) {}
  };
}

/* ============ СОХРАНЕНИЕ В ИСТОРИЮ ============ */
function saveSpreadToHistory() {
  saveQuestionState();
  const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
  const spread = SPREADS[currentSpread];
  const cardsText = buildCardsText();
  if (!cardsText.trim()) {
    alert("Добавьте хотя бы одну карту.");
    return;
  }
  history.unshift({
    date: new Date().toLocaleString("ru-RU"),
    question: document.getElementById("questionInput").value,
    context: document.getElementById("contextInput").value,
    shortAnswer: "",
    detailedAnswer: "",
    spreadDescription: "",
    cards: cardsText,
    spreadType: spread.name,
    note: ""
  });
  localStorage.setItem("tarot_history", JSON.stringify(history));
  alert("Расклад сохранён в личном кабинете.");
}

function buildCardsText() {
  const spread = SPREADS[currentSpread];
  let text = "";
  if (currentSpread === "free") {
    tableCards.forEach((c, i) => {
      if (c) text += `Карта ${i+1}: ${c.card}${c.flipped ? " (перевёрнута)" : ""}\n`;
    });
  } else {
    spread.positions.forEach((p, i) => {
      const c = tableCards[i];
      if (c) text += `${p}: ${c.card}${c.flipped ? " (перевёрнута)" : ""}\n`;
    });
  }
  return text;
}

/* ============ ИИ-ПРЕДСКАЗАНИЕ ============ */
async function getAIPrediction() {
  saveQuestionState();
  const question = document.getElementById("questionInput").value.trim();
  const context = document.getElementById("contextInput").value.trim();
  const useHistory = document.getElementById("useHistory").checked;
  const cardsText = buildCardsText();
  if (!cardsText.trim()) {
    alert("Добавьте хотя бы одну карту.");
    return;
  }

  let prompt = `Ты мудрая гадалка. Вопрос: ${question || "нет вопроса"}. Контекст: ${context || "нет контекста"}. Текст расклада с картами и позициями:\n${cardsText}`;
  if (useHistory) {
    const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
    if (history.length) {
      prompt += "\nПредыдущие расклады (кратко):\n";
      history.slice(0, 3).forEach(h => {
        prompt += `- ${h.cards.replace(/\n/g, ", ")}\n`;
      });
    }
  }
  prompt += "\nОтвечай в формате:\n1) Краткий ответ 2-3 предложения.\n2) Подробный ответ развёрнуто.\n3) Описание расклада — анализ карт.";

  showLoading(true);
  try {
    const resp = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "openai",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.7
      })
    });
    const data = await resp.json();
    let text = "";
    if (data && data.choices && data.choices[0]) {
      text = data.choices[0].message.content;
    } else if (typeof data === "string") {
      text = data;
    } else if (data && data.content) {
      text = data.content;
    } else {
      text = JSON.stringify(data);
    }
    const parsed = parseAIResponse(text);
    displayPrediction(parsed);
    // Сохраним в последний расклад
    const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
    if (history.length) {
      history[0].shortAnswer = parsed.short;
      history[0].detailedAnswer = parsed.detailed;
      history[0].spreadDescription = parsed.spread;
      localStorage.setItem("tarot_history", JSON.stringify(history));
    }
  } catch (e) {
    alert("Ошибка получения предсказания: " + e.message);
  } finally {
    showLoading(false);
  }
}

function parseAIResponse(text) {
  // Очистка от markdown
  let clean = text.replace(/```/g, "").replace(/`/g, "").replace(/\|/g, "").replace(/---/g, "");
  clean = clean.replace(/[#*]/g, "");

  let short = "", detailed = "", spread = "";
  const m1 = clean.match(/1\)\s*([\s\S]*?)(?=2\)|$)/);
  const m2 = clean.match(/2\)\s*([\s\S]*?)(?=3\)|$)/);
  const m3 = clean.match(/3\)\s*([\s\S]*?)$/);
  if (m1) short = m1[1].trim();
  if (m2) detailed = m2[1].trim();
  if (m3) spread = m3[1].trim();
  if (!short && !detailed && !spread) {
    detailed = clean;
  }
  return { short, detailed, spread };
}

function displayPrediction(parsed) {
  document.getElementById("shortAnswer").textContent = parsed.short;
  document.getElementById("detailedAnswer").textContent = parsed.detailed;
  document.getElementById("spreadDescription").textContent = parsed.spread;
  document.getElementById("quote").textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById("prediction").classList.add("visible");
  document.getElementById("prediction").scrollIntoView({ behavior: "smooth" });
}

function showLoading(show) {
  const el = document.getElementById("loadingOverlay");
  if (show) el.classList.add("visible");
  else el.classList.remove("visible");
}

/* ============ ЛИЧНЫЙ КАБИНЕТ ============ */
function openCabinet() {
  const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
  const list = document.getElementById("historyList");
  list.innerHTML = "";
  if (!history.length) {
    list.innerHTML = '<div class="no-readings">Нет сохранённых раскладов</div>';
  } else {
    history.forEach((h, idx) => {
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <h4>№${history.length - idx}. ${escapeHtml(h.spreadType || "")}</h4>
        <div class="meta">${escapeHtml(h.date || "")}</div>
        ${h.question ? `<p><strong>Вопрос:</strong> ${escapeHtml(h.question)}</p>` : ""}
        ${h.context ? `<p><strong>Контекст:</strong> ${escapeHtml(h.context)}</p>` : ""}
        <p><strong>Карты:</strong><br>${escapeHtml(h.cards || "")}</p>
        ${h.shortAnswer ? `<p><strong>Краткий ответ:</strong> ${escapeHtml(h.shortAnswer)}</p>` : ""}
        ${h.detailedAnswer ? `<p><strong>Подробно:</strong> ${escapeHtml(h.detailedAnswer)}</p>` : ""}
        ${h.spreadDescription ? `<p><strong>Расклад:</strong> ${escapeHtml(h.spreadDescription)}</p>` : ""}
        <label>Заметки:</label>
        <textarea rows="2" data-idx="${idx}" oninput="updateNote(${idx}, this.value)">${escapeHtml(h.note || "")}</textarea>
        <button class="delete-btn" onclick="deleteReading(${idx})">Удалить</button>
      `;
      list.appendChild(item);
    });
  }
  document.getElementById("cabinetModal").classList.add("visible");
}

function closeCabinet() {
  document.getElementById("cabinetModal").classList.remove("visible");
}

function updateNote(idx, val) {
  const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
  if (history[idx]) {
    history[idx].note = val;
    localStorage.setItem("tarot_history", JSON.stringify(history));
  }
}

function deleteReading(idx) {
  if (!confirm("Удалить этот расклад?")) return;
  const history = JSON.parse(localStorage.getItem("tarot_history") || "[]");
  history.splice(idx, 1);
  localStorage.setItem("tarot_history", JSON.stringify(history));
  openCabinet();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

/* ============ КОТ ============ */
function setupCat() {
  const container = document.getElementById("catContainer");
  const paw = document.getElementById("paw");
  document.addEventListener("mousemove", (e) => {
    const rect = container.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150) {
      paw.classList.add("active");
      const angle = Math.atan2(dy, dx);
      const reach = Math.min(40, (150 - dist) / 3);
      const tx = Math.cos(angle) * reach;
      const ty = Math.sin(angle) * reach;
      paw.style.transform = `translate(${tx}px, ${ty}px)`;
    } else {
      paw.classList.remove("active");
      paw.style.transform = "";
    }
  });
}

/* ============ ЗАКРЫТИЕ МОДАЛОК ПО ФОНУ ============ */
document.getElementById("cardModal").addEventListener("click", (e) => {
  if (e.target.id === "cardModal") closeCardModal();
});
document.getElementById("cabinetModal").addEventListener("click", (e) => {
  if (e.target.id === "cabinetModal") closeCabinet();
});

window.addEventListener("resize", scaleTableIfNeeded);
window.addEventListener("load", init);
